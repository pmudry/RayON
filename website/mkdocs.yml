site_name: RayON | Yet another ray-tracer
site_description: An interactive high-performance CPU & CUDA path tracer with progressive sampling.
site_author: Pierre-André Mudry
site_url: https://pmudry.github.io/RayON
repo_url: https://github.com/pmudry/RayON
repo_name: pmudry/RayON
edit_uri: ""

docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: docs/overrides
  favicon: assets/images/favicon.png
  palette:
    - scheme: slate
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - toc.integrate
    - search.suggest
    - search.highlight

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pmudry/RayON
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: This page was helpful
          data: 1
          note: "Thanks for your feedback!"
        - icon: material/thumb-down-outline
          name: This page could be improved
          data: 0
          note: "Thanks for your feedback!"

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - admonition
  - footnotes
  - tables
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

hooks:
  - hooks.py

plugins:
  - search
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - How It Works:
    - how-it-works/index.md
    - Ray Tracing & Path Tracing: how-it-works/ray-tracing.md
    - Materials: how-it-works/materials.md
    - BVH Acceleration: how-it-works/bvh.md
    - Hemisphere Sampling: how-it-works/sampling.md
  - Architecture:
    - architecture/index.md
    - Scene System: architecture/scene-system.md
    - CUDA Renderer: architecture/cuda-renderer.md
    - Progressive Rendering: architecture/progressive-rendering.md
  - Features:
    - features/index.md
    - Interactive Mode: features/interactive.md
    - YAML Scene Format: features/scenes.md
    - SDF Shapes: features/sdf-shapes.md
    - OBJ Loading: features/obj-loading.md
  - Gallery: gallery.md
  - Performance: performance.md
  - About: about.md
