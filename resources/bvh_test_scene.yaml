# Large test scene for BVH performance testing
# Many spheres to demonstrate acceleration

camera:
  position: [0, 2, 10]
  look_at: [0, 0, 0]
  up: [0, 1, 0]
  fov: 60

settings:
  background_color: [0.5, 0.7, 1.0]
  ambient_light: 0.1
  use_bvh: true  # Enable BVH acceleration

materials:
  - name: ground
    type: lambertian
    albedo: [0.5, 0.5, 0.5]
  
  - name: red
    type: lambertian
    albedo: [0.9, 0.2, 0.2]
  
  - name: green
    type: lambertian
    albedo: [0.2, 0.9, 0.2]
  
  - name: blue
    type: lambertian
    albedo: [0.2, 0.2, 0.9]
  
  - name: metal
    type: rough_mirror
    albedo: [0.8, 0.8, 0.8]
    roughness: 0.05
  
  - name: glass
    type: glass
    refractive_index: 1.5
  
  - name: light
    type: light
    emission: [8.0, 7.0, 6.0]

geometries:
  # Ground plane
  - type: sphere
    material: ground
    center: [0, -1000, 0]
    radius: 1000
  
  # Area light
  - type: rectangle
    material: light
    corner: [-2, 5, -2]
    u: [4, 0, 0]
    v: [0, 0, 4]
  
  # Create a grid of spheres (10x10 = 100 spheres)
  # Row 1
  - { type: sphere, material: red, center: [-9, 0.5, -9], radius: 0.5 }
  - { type: sphere, material: green, center: [-7, 0.5, -9], radius: 0.5 }
  - { type: sphere, material: blue, center: [-5, 0.5, -9], radius: 0.5 }
