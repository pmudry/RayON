scene:
  name: "Cornell Box with Glass Lucy"
  description: "A glass Lucy statue inside a Cornell box"
  
  camera:
    position: [0.0, 1.0, 3.8]
    look_at: [0.0, 1.0, 0.0]
    up: [0.0, 1.0, 0.0]
    fov: 35.0
  
  background_color: [0.0, 0.0, 0.0]
  use_bvh: true

materials:
  - name: "white"
    type: "lambertian"
    albedo: [0.73, 0.73, 0.73]
  
  - name: "red"
    type: "lambertian"
    albedo: [0.65, 0.05, 0.05]
  
  - name: "green"
    type: "lambertian"
    albedo: [0.12, 0.45, 0.15]
  
  - name: "light"
    type: "light"
    emission: [15.0, 15.0, 15.0]
    albedo: [1.0, 1.0, 1.0]
  
  - name: "glass"
    type: "glass"
    refractive_index: 1.5

geometry:
  # Floor
  - type: "rectangle"
    material: "white"
    corner: [-1.0, 0.0, -1.0]
    u: [2.0, 0.0, 0.0]
    v: [0.0, 0.0, 2.0]
  
  # Ceiling
  - type: "rectangle"
    material: "white"
    corner: [-1.0, 2.0, -1.0]
    u: [2.0, 0.0, 0.0]
    v: [0.0, 0.0, 2.0]
  
  # Back wall
  - type: "rectangle"
    material: "white"
    corner: [-1.0, 0.0, -1.0]
    u: [2.0, 0.0, 0.0]
    v: [0.0, 2.0, 0.0]
  
  # Left wall (red)
  - type: "rectangle"
    material: "red"
    corner: [-1.0, 0.0, -1.0]
    u: [0.0, 2.0, 0.0]
    v: [0.0, 0.0, 2.0]
  
  # Right wall (green)
  - type: "rectangle"
    material: "green"
    corner: [1.0, 0.0, -1.0]
    u: [0.0, 0.0, 2.0]
    v: [0.0, 2.0, 0.0]
  
  # Area light
  - type: "rectangle"
    material: "light"
    corner: [-0.3, 1.98, -0.3]
    u: [0.6, 0.0, 0.0]
    v: [0.0, 0.0, 0.6]
  
  # Lucy Statue
  # Note: You need to place 'lucy.obj' in 'resources/assets/'
  - type: "obj"
    filename: "resources/assets/lucy.obj"
    material: "glass"
    position: [0.0, 0.0, 0.0]
    scale: [0.001, 0.001, 0.001] # Adjust based on model units (often mm -> m needs 0.001)
    rotation: [0, -45, 0] # Rotate Y axis
