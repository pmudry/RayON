# Cornell Box Scene
# Classic Cornell box with colored walls and two boxes

scene:
  name: "Cornell Box"
  description: "Classic Cornell box with red left wall, green right wall, white walls, and two boxes"
  
  # Camera settings (looking into the box)
  camera:
    position: [0.0, 1.0, 5.5]
    look_at: [0.0, 1.0, 0.0]
    up: [0.0, 1.0, 0.0]
    fov: 40.0
  
  # Background and ambient lighting
  background_color: [0.0, 0.0, 0.0]
  ambient_light: 0.0
  use_bvh: false

# Material definitions
materials:
  - name: "white"
    type: "lambertian"
    albedo: [0.73, 0.73, 0.73]
  
  - name: "red"
    type: "lambertian"
    albedo: [0.65, 0.05, 0.05]
  
  - name: "green"
    type: "lambertian"
    albedo: [0.12, 0.45, 0.15]
  
  - name: "light"
    type: "light"
    emission: [15.0, 15.0, 15.0]
    albedo: [1.0, 1.0, 1.0]
  
  - name: "box_white"
    type: "lambertian"
    albedo: [0.73, 0.73, 0.73]

# Cornell box geometry
geometry:
  # Floor (white)
  - type: "rectangle"
    material: "white"
    corner: [-1.0, 0.0, -1.0]
    u: [2.0, 0.0, 0.0]
    v: [0.0, 0.0, 2.0]
  
  # Ceiling (white)
  - type: "rectangle"
    material: "white"
    corner: [-1.0, 2.0, -1.0]
    u: [2.0, 0.0, 0.0]
    v: [0.0, 0.0, 2.0]
  
  # Back wall (white)
  - type: "rectangle"
    material: "white"
    corner: [-1.0, 0.0, -1.0]
    u: [2.0, 0.0, 0.0]
    v: [0.0, 2.0, 0.0]
  
  # Left wall (red)
  - type: "rectangle"
    material: "red"
    corner: [-1.0, 0.0, -1.0]
    u: [0.0, 0.0, 2.0]
    v: [0.0, 2.0, 0.0]
  
  # Right wall (green)
  - type: "rectangle"
    material: "green"
    corner: [1.0, 0.0, -1.0]
    u: [0.0, 0.0, 2.0]
    v: [0.0, 2.0, 0.0]
  
  # Area light (ceiling, centered)
  - type: "rectangle"
    material: "light"
    corner: [-0.3, 1.99, -0.3]
    u: [0.6, 0.0, 0.0]
    v: [0.0, 0.0, 0.6]
  
  # Tall box (left back) - approximated with spheres
  - type: "sphere"
    material: "box_white"
    center: [-0.33, 0.3, -0.35]
    radius: 0.3
  
  - type: "sphere"
    material: "box_white"
    center: [-0.33, 0.6, -0.35]
    radius: 0.28
  
  - type: "sphere"
    material: "box_white"
    center: [-0.33, 0.85, -0.35]
    radius: 0.25
  
  # Short box (right front) - approximated with spheres
  - type: "sphere"
    material: "box_white"
    center: [0.33, 0.15, 0.35]
    radius: 0.15
  
  - type: "sphere"
    material: "box_white"
    center: [0.33, 0.35, 0.35]
    radius: 0.15
