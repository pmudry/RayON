# BVH stress test: metallic sphere pyramid
# 385 pyramid spheres + ground + light

camera:
  position: [0.0, 12.0, 22.0]
  look_at: [0.0, 3.0, 0.0]
  up: [0.0, 1.0, 0.0]
  fov: 40.0

settings:
  background_color: [0.25, 0.35, 0.55]
  ambient_light: 0.08
  background_intensity: 0.25
  use_bvh: true

materials:
  - { name: ground, type: lambertian, albedo: [0.35, 0.38, 0.42] }
  - { name: light, type: light, emission: [8.0, 7.5, 7.0], albedo: [1.0, 1.0, 1.0] }
  # --- Pyramid metallic materials (grey/blue, matte metals) ---
