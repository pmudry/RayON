# Default Scene Configuration
# This scene matches the create_scene_description() function in main.cc

scene:
  name: "Default Scene"
  description: "Scene with rough mirrors, glass, Fibonacci dots, and area light"
  
  # Camera settings
  camera:
    position: [0.0, 1.0, 4.0]
    look_at: [0.0, 0.0, -1.0]
    up: [0.0, 1.0, 0.0]
    fov: 60.0
  
  # Background and ambient lighting
  background_color: [0.5, 0.7, 1.0]
  ambient_light: 0.1
  use_bvh: false

# Material definitions
materials:
  - name: "ground"
    type: "lambertian"
    albedo: [0.44, 0.7, 0.95]
  
  - name: "golden_rough"
    type: "rough_mirror"
    albedo: [1.0, 0.85, 0.47]
    roughness: 0.03
    metallic: 1.0
  
  - name: "blue_rough"
    type: "rough_mirror"
    albedo: [0.3, 0.3, 0.91]
    roughness: 0.3
    metallic: 1.0
  
  - name: "red_fibonacci_dots"
    type: "lambertian"
    albedo: [0.9, 0.1, 0.1]
    pattern:
      type: "fibonacci_dots"
      color: [0.02, 0.02, 0.02]
      dot_count: 12
      dot_radius: 0.33
  
  - name: "glass"
    type: "glass"
    albedo: [1.0, 1.0, 1.0]
    refractive_index: 1.5
    transmission: 1.0
  
  - name: "isc_yellow"
    type: "lambertian"
    albedo: [0.969, 0.945, 0.624]  # 247/255, 241/255, 159/255
  
  - name: "isc_blue"
    type: "lambertian"
    albedo: [0.549, 0.776, 0.902]  # 140/255, 198/255, 230/255
  
  - name: "isc_violet"
    type: "lambertian"
    albedo: [0.659, 0.565, 0.753]  # 168/255, 144/255, 192/255
  
  - name: "isc_rose"
    type: "lambertian"
    albedo: [0.886, 0.671, 0.729]  # 226/255, 171/255, 186/255
  
  - name: "isc_green"
    type: "lambertian"
    albedo: [0.596, 0.780, 0.749]  # 152/255, 199/255, 191/255
  
  - name: "area_light"
    type: "light"
    emission: [4.8, 4.1, 3.7]
    albedo: [1.0, 1.0, 1.0]

# Geometry definitions
geometry:
  - type: "sphere"
    material: "ground"
    center: [0.0, -950.5, -1.0]
    radius: 950.0
  
  - type: "sphere"
    material: "golden_rough"
    center: [-3.5, 0.45, -1.8]
    radius: 0.8
  
  - type: "displaced_sphere"
    material: "blue_rough"
    center: [1.2, 0.0, -2.0]
    radius: 0.5
    displacement_scale: 0.2
    pattern_type: 0  # 0 = golf ball dimples
  
  - type: "sphere"
    material: "red_fibonacci_dots"
    center: [-1.3, 0.18, -5.0]
    radius: 0.7
  
  - type: "sphere"
    material: "glass"
    center: [-0.7, 0.2, -0.3]
    radius: 0.6
  
  # ISC Logo spheres
  - type: "sphere"
    material: "isc_yellow"
    center: [-3.5, -0.3, 1.2]
    radius: 0.2
  
  - type: "sphere"
    material: "isc_blue"
    center: [-3.0, -0.3, 1.2]
    radius: 0.2
  
  - type: "sphere"
    material: "isc_violet"
    center: [-2.5, -0.3, 1.2]
    radius: 0.2
  
  - type: "sphere"
    material: "isc_rose"
    center: [-2.0, -0.3, 1.2]
    radius: 0.2
  
  - type: "sphere"
    material: "isc_green"
    center: [-1.5, -0.3, 1.2]
    radius: 0.2
  
  # Area light (rectangular emitter)
  - type: "rectangle"
    material: "area_light"
    corner: [-1.0, 3.0, -2.0]
    u: [2.5, 0.0, 0.0]
    v: [0.0, 0.0, 1.5]
