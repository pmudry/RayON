# Simple Test Scene
# A minimalist scene for testing

scene:
  name: "Simple Test Scene"
  description: "Three spheres with different materials"

materials:
  - name: "ground"
    type: "lambertian"
    albedo: [0.5, 0.5, 0.5]
  
  - name: "red_sphere"
    type: "lambertian"
    albedo: [0.9, 0.1, 0.1]
  
  - name: "glass_sphere"
    type: "glass"
    albedo: [1.0, 1.0, 1.0]
    refractive_index: 1.5
    transmission: 1.0
  
  - name: "metal_sphere"
    type: "rough_mirror"
    albedo: [0.8, 0.6, 0.2]
    roughness: 0.05
    metallic: 1.0

geometry:
  # Large ground sphere
  - type: "sphere"
    material: "ground"
    center: [0.0, -1000.5, -1.0]
    radius: 1000.0
  
  # Red sphere (left)
  - type: "sphere"
    material: "red_sphere"
    center: [-1.2, 0.0, -1.0]
    radius: 0.5
  
  # Glass sphere (center)
  - type: "sphere"
    material: "glass_sphere"
    center: [0.0, 0.0, -1.0]
    radius: 0.5
  
  # Metal sphere (right)
  - type: "sphere"
    material: "metal_sphere"
    center: [1.2, 0.0, -1.0]
    radius: 0.5
