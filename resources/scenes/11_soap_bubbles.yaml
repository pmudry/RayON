# Soap Bubbles — Thin-Film Interference Demo
#
# Demonstrates the analytic thin-film interference shader (Airy formula).
# Each bubble uses a different film thickness, producing distinct iridescent
# color patterns.  The scene is lit by a large overhead area light so that
# the reflection colors are clearly visible.

camera:
  position: [0.0, 1.5, 6.0]
  look_at: [0.0, 1.0, 0.0]
  up: [0.0, 1.0, 0.0]
  fov: 40.0

settings:
  background_color: [0.02, 0.02, 0.05]
  ambient_light: 0.0
  background_intensity: 0.0
  use_bvh: true
  adaptive_sampling: false

materials:
  # Floor
  - { name: floor, type: lambertian, albedo: [0.15, 0.15, 0.18] }

  # Overhead area light
  - { name: light, type: light, emission: [18.0, 18.0, 18.0], albedo: [1.0, 1.0, 1.0] }

  # Background wall (dark)
  - { name: wall, type: lambertian, albedo: [0.08, 0.08, 0.10] }

  # Soap bubbles with varying film thickness (nm) → different dominant colors
  #   ~300 nm → violet/blue tints
  #   ~400 nm → blue/green
  #   ~500 nm → green/yellow
  #   ~600 nm → orange/red
  #   ~350 nm → indigo/cyan
  - { name: bubble_300, type: thin_film, film_thickness: 300.0, film_ior: 1.33, refractive_index: 1.0 }
  - { name: bubble_400, type: thin_film, film_thickness: 400.0, film_ior: 1.33, refractive_index: 1.0 }
  - { name: bubble_500, type: thin_film, film_thickness: 500.0, film_ior: 1.33, refractive_index: 1.0 }
  - { name: bubble_600, type: thin_film, film_thickness: 600.0, film_ior: 1.33, refractive_index: 1.0 }
  - { name: bubble_350, type: thin_film, film_thickness: 350.0, film_ior: 1.33, refractive_index: 1.0 }

  # Small accent bubbles
  - { name: bubble_250, type: thin_film, film_thickness: 250.0, film_ior: 1.33, refractive_index: 1.0 }
  - { name: bubble_450, type: thin_film, film_thickness: 450.0, film_ior: 1.33, refractive_index: 1.0 }
  - { name: bubble_550, type: thin_film, film_thickness: 550.0, film_ior: 1.33, refractive_index: 1.0 }

  # Glass sphere for contrast
  - { name: glass, type: glass, refractive_index: 1.5 }

geometry:
  # Floor
  - { type: rectangle, material: floor, corner: [-6.0, 0.0, -4.0], u: [12.0, 0.0, 0.0], v: [0.0, 0.0, 8.0] }

  # Back wall
  - { type: rectangle, material: wall, corner: [-6.0, 0.0, -4.0], u: [12.0, 0.0, 0.0], v: [0.0, 5.0, 0.0] }

  # Overhead light
  - { type: rectangle, material: light, corner: [-2.0, 4.0, -1.0], u: [4.0, 0.0, 0.0], v: [0.0, 0.0, 4.0] }

  # Front row — large bubbles
  - { type: sphere, material: bubble_300, center: [-2.2, 0.85, 1.5], radius: 0.85 }
  - { type: sphere, material: bubble_400, center: [-0.3, 0.75, 1.8], radius: 0.75 }
  - { type: sphere, material: bubble_500, center: [1.6,  0.90, 1.3], radius: 0.90 }

  # Back row — medium bubbles
  - { type: sphere, material: bubble_600, center: [-1.5, 0.65, -0.3], radius: 0.65 }
  - { type: sphere, material: bubble_350, center: [0.7,  0.55, -0.5], radius: 0.55 }

  # Small floating accent bubbles
  - { type: sphere, material: bubble_250, center: [-0.9, 2.0,  0.5], radius: 0.30 }
  - { type: sphere, material: bubble_450, center: [1.3,  1.8,  0.8], radius: 0.25 }
  - { type: sphere, material: bubble_550, center: [2.5,  1.3,  0.2], radius: 0.35 }

  # Glass sphere as contrast reference
  - { type: sphere, material: glass, center: [2.8, 0.45, 1.8], radius: 0.45 }
